<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Boss Tracker - Cabal</title>

<style>

/* ===== VARIABLES ===== */
:root {
  --bg-color: #0d1117;
  --text-color: #e6edf3;
  --accent: #58a6ff;
  --border-color: rgba(88,166,255,0.2);

  --timer-blue: #0077ff;
  --timer-green: #00cc44;
  --timer-yellow: #ffcc00;
  --timer-red: #ff0033;
}

/* ===== BASE ===== */
body {
  font-family: Arial;
  background: var(--bg-color);
  color: var(--text-color);
  margin: 0;
  padding: 20px;
}

h2 {
  text-align: center;
  color: var(--accent);
  text-shadow: 0 0 10px var(--accent);
}

/* ===== TABLE ===== */
table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  border: 1px solid var(--border-color);
  padding: 4px;
  text-align: center;
}

th {
  color: var(--accent);
}

input[type="checkbox"] {
  transform: scale(1.4);
  accent-color: var(--accent);
}

/* ===== TIMER ===== */
.timer {
  padding: 2px 6px;
  border-radius: 4px;
}

.blue { background: var(--timer-blue); color:white; }
.green { background: var(--timer-green); color:black; }
.yellow { background: var(--timer-yellow); color:black; }
.red { background: var(--timer-red); color:white; }

/* ===== SETTINGS BUTTON ===== */
#settingsToggle {
  position: fixed;
  left: 20px;
  bottom: 20px;
  width: 45px;
  height: 45px;
  background: linear-gradient(145deg, #0ff, #0066ff);
  border-radius: 50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  box-shadow:0 0 15px #00e5ff;
}

/* ===== PANEL ===== */
#settingsPanel {
  position: fixed;
  left: -260px;
  bottom: 20px;
  width: 240px;
  background: rgba(10,15,25,0.95);
  border-radius: 10px;
  padding:10px;
  transition:0.4s;
}

#settingsPanel.open {
  left: 20px;
}

.panel-body {
  display:flex;
  flex-direction:column;
  gap:6px;
}

.panel-body input {
  height:30px;
}

#resetTheme {
  margin-top:10px;
}

</style>
</head>

<body>

<h2>Boss Tracker</h2>
<table id="bossTable"></table>

<!-- SETTINGS -->
<div id="settingsToggle">⚙</div>

<div id="settingsPanel">
  <div class="panel-body">
    Accent <input type="color" id="accentColor">
    Background <input type="color" id="bgColor">
    Text <input type="color" id="textColor">
    Border <input type="color" id="borderColor">
    Timer Red <input type="color" id="timerRed">
    Timer Green <input type="color" id="timerGreen">
    <button id="resetTheme">RESET</button>
  </div>
</div>

<script>

/* ===== SETTINGS ===== */
const panel = document.getElementById("settingsPanel");
document.getElementById("settingsToggle").onclick = () => {
  panel.classList.toggle("open");
};

function setVar(name, value) {
  document.documentElement.style.setProperty(name, value);
}

function bind(id, varName, key) {
  const el = document.getElementById(id);

  const saved = localStorage.getItem(key);
  if (saved) {
    setVar(varName, saved);
    el.value = saved;
  }

  el.oninput = e => {
    setVar(varName, e.target.value);
    localStorage.setItem(key, e.target.value);
  };
}

bind("accentColor","--accent","accent");
bind("bgColor","--bg-color","bg");
bind("textColor","--text-color","text");
bind("borderColor","--border-color","border");
bind("timerRed","--timer-red","tred");
bind("timerGreen","--timer-green","tgreen");

document.getElementById("resetTheme").onclick = () => {
  localStorage.clear();
  location.reload();
};

/* ===== TABLE SIMPLE DEMO ===== */
const bosses = ["Manticore","Kimzark","Pluma"];
const table = document.getElementById("bossTable");

let header = "<tr><th>CH</th>";
bosses.forEach(b => header += `<th>${b}</th>`);
header += "</tr>";
table.innerHTML = header;

for (let ch=1; ch<=5; ch++) {
  let row = `<tr><td>${ch}</td>`;
  bosses.forEach(b=>{
    row += `<td><input type="checkbox"><div class="timer green">10:00</div></td>`;
  });
  row += "</tr>";
  table.innerHTML += row;
}

</script>
</body>
</html>
